<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title th:text="#{page.upload.title}">Class Diagram Generator</title>
    <link rel="icon" href="/favicon.ico" th:href="@{/favicon.ico}">
    <link rel="stylesheet" href="/webjars/bootstrap/dist/css/bootstrap.min.css" th:href="@{/webjars/bootstrap/dist/css/bootstrap.min.css}">
    <link rel="stylesheet" href="/webjars/bootstrap-icons/font/bootstrap-icons.css" th:href="@{/webjars/bootstrap-icons/font/bootstrap-icons.css}">
    <link rel="stylesheet" href="/css/app.css" th:href="@{/css/app.css}">
</head>
<body>
<nav class="navbar navbar-expand navbar-light border-bottom app-navbar">
    <div class="container">
        <a class="navbar-brand" href="/">class-diagram-generator</a>
        <div>
            <a class="btn btn-sm btn-outline-secondary rounded-pill" href="?lang=ko">KO</a>
            <a class="btn btn-sm btn-outline-secondary rounded-pill" href="?lang=en">EN</a>
        </div>
    </div>
</nav>
<main class="container page-shell">
    <section class="hero-card">
    <div class="d-flex flex-column flex-lg-row justify-content-between align-items-start gap-3 mb-4">
        <div>
            <h1 class="page-title" th:text="#{page.upload.title}"></h1>
        </div>
        <div class="d-flex gap-2 flex-wrap">
            <span class="feature-pill">docx</span>
            <span class="feature-pill">xlsx</span>
            <span class="feature-pill">md</span>
        </div>
    </div>
    <form id="uploadForm" class="row g-4" enctype="multipart/form-data">
        <div class="col-md-6">
            <label class="form-label" th:text="#{page.upload.programName}"></label>
            <input class="form-control" name="programName" required pattern="^[A-Za-z0-9_-]+$" maxlength="64">
        </div>
        <div class="col-md-3">
            <label class="form-label" th:text="#{page.upload.version}"></label>
            <input class="form-control" name="version" required pattern="^[A-Za-z0-9._-]+$" maxlength="32" value="v1.0">
        </div>
        <div class="col-md-3">
            <label class="form-label" th:text="#{page.upload.language}"></label>
            <select class="form-select" name="language">
                <option value="ko" th:selected="${#locale.language == 'ko'}">한국어</option>
                <option value="en" th:selected="${#locale.language == 'en'}">English</option>
            </select>
        </div>
        <div class="col-12">
            <label class="form-label" th:text="#{page.upload.formats}"></label>
            <div class="format-grid">
                <label class="form-check-card">
                    <input type="checkbox" class="form-check-input" name="formats" value="docx" checked>
                    <span>docx</span>
                </label>
                <label class="form-check-card">
                    <input type="checkbox" class="form-check-input" name="formats" value="xlsx" checked>
                    <span>xlsx</span>
                </label>
                <label class="form-check-card">
                    <input type="checkbox" class="form-check-input" name="formats" value="md" checked>
                    <span>md</span>
                </label>
            </div>
        </div>
        <div class="col-12">
            <label class="form-label" th:text="#{page.upload.file}"></label>
            <input type="file" class="form-control" name="file" accept=".zip" required>
        </div>
        <div class="col-12">
            <button type="submit" class="btn btn-primary px-4" th:text="#{page.upload.submit}"></button>
        </div>
    </form>
    </section>
</main>
<div th:replace="~{fragments/language-modal :: modal}"></div>
<script src="/webjars/bootstrap/dist/js/bootstrap.bundle.min.js" th:src="@{/webjars/bootstrap/dist/js/bootstrap.bundle.min.js}"></script>
<script src="/js/upload.js" th:src="@{/js/upload.js}"></script>
</body>
</html>
