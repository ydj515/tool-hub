<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title th:text="#{page.progress.title}">Progress</title>
    <link rel="icon" href="/favicon.ico" th:href="@{/favicon.ico}">
    <link rel="stylesheet" href="/webjars/bootstrap/dist/css/bootstrap.min.css" th:href="@{/webjars/bootstrap/dist/css/bootstrap.min.css}">
    <link rel="stylesheet" href="/css/app.css" th:href="@{/css/app.css}">
</head>
<body>
<nav class="navbar navbar-expand navbar-light border-bottom app-navbar">
    <div class="container">
        <a class="navbar-brand" href="/">class-diagram-generator</a>
    </div>
</nav>
<main class="container page-shell">
    <section class="hero-card hero-card-compact">
        <h1 class="page-title" th:text="#{page.progress.title}"></h1>
        <div class="meta-grid">
            <div class="meta-card">
                <span class="meta-label" th:text="#{page.progress.stage}"></span>
                <strong id="stage" class="meta-value">-</strong>
            </div>
            <div class="meta-card">
                <span class="meta-label" th:text="#{page.progress.percent}">Progress</span>
                <strong id="progressPercent" class="meta-value">0%</strong>
            </div>
        </div>
    </section>
    <section class="surface-card mt-4">
        <div class="progress progress-lg">
            <div id="bar" class="progress-bar progress-bar-striped progress-bar-animated"
                 role="progressbar" style="width: 0%">0%</div>
        </div>
        <div id="warnings" class="warning-stack mt-4"></div>
    </section>
</main>
<script th:inline="javascript">
    window.__jobId = /*[[${jobId}]]*/ '';
    window.__progressStageLabels = {
        EXTRACTING: /*[[#{page.progress.stage.extracting}]]*/ 'Extracting',
        DETECTING_MODULES: /*[[#{page.progress.stage.detectingModules}]]*/ 'Detecting Modules',
        PARSING: /*[[#{page.progress.stage.parsing}]]*/ 'Parsing Sources',
        CLASSIFYING: /*[[#{page.progress.stage.classifying}]]*/ 'Classifying Layers',
        ASSIGNING_IDS: /*[[#{page.progress.stage.assigningIds}]]*/ 'Assigning IDs',
        RENDERING_DOCX: /*[[#{page.progress.stage.renderingDocx}]]*/ 'Rendering DOCX',
        RENDERING_XLSX: /*[[#{page.progress.stage.renderingXlsx}]]*/ 'Rendering XLSX',
        RENDERING_MD: /*[[#{page.progress.stage.renderingMd}]]*/ 'Rendering Markdown',
        PACKAGING: /*[[#{page.progress.stage.packaging}]]*/ 'Packaging Results'
    };
</script>
<script src="/webjars/bootstrap/dist/js/bootstrap.bundle.min.js" th:src="@{/webjars/bootstrap/dist/js/bootstrap.bundle.min.js}"></script>
<script src="/js/progress.js" th:src="@{/js/progress.js}"></script>
</body>
</html>
